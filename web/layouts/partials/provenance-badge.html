{{/*
  Renders an interactive provenance badge for a source object.
  @context . - A source object.
*/}}
{{ with . }}
<div class="inline-block ml-2 relative group align-middle">
  <a href="{{ .resolved_url }}" target="_blank" rel="noopener noreferrer"
     class="flex items-center px-0.5 py-0.5 text-xs font-semibold text-gray-700 bg-gray-100 rounded hover:bg-gray-200 border border-gray-200"
     title="Click to view source">
    {{ if eq .source_type "attached_report" }}
      {{/* Document Icon */}}
      <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd" d="M4 4a2 2 0 012-2h8a2 2 0 012 2v12a2 2 0 01-2 2H6a2 2 0 01-2-2V4zm2 1a1 1 0 000 2h6a1 1 0 100-2H6zM6 9a1 1 0 000 2h6a1 1 0 100-2H6z" clip-rule="evenodd" />
      </svg>
    {{ end }}
  </a>
  <div class="absolute z-10 w-64 p-2 mt-1 text-xs text-left text-gray-700 bg-white border border-gray-200 rounded-lg shadow-lg opacity-0 group-hover:opacity-100 invisible group-hover:visible transition-opacity duration-300" style="bottom: 100%; left: 50%; transform: translateX(-50%); margin-bottom: 0.5rem;">
    <p class="font-semibold">Source Quote{{ with .page_number }} (from P.{{ . }}){{ end }}:</p>
    <p class="italic">"{{ .quote }}"</p>
  </div>
</div>
{{ end }}
