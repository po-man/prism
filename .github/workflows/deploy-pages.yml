name: Deploy PRISM to GitHub Pages

on:
  push:
    tags:
      # Triggers on CalVer and SemVer tags, e.g., v2026.03.05 or v1.0.0
      - 'v[0-9]+.[0-9]+.[0-9]+*'

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        # All Hugo and Node commands must run inside the web/ directory
        working-directory: ./web 
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history so Hugo can calculate Lastmod dates if needed

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './web/package.json'

      - name: Install NPM Dependencies
        run: npm install

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          # Extended version is strictly required to process Tailwind CSS via PostCSS
          extended: true 

      - name: Generate Markdown Stubs
        # This script reads organisation JSON data and creates content stubs for Hugo.
        run: python ../scripts/generate_stubs.py ../data/organisations content

      - name: Build PRISM Report Cards
        env:
          HUGO_ENVIRONMENT: production
          HUGO_PRISM_VERSION: ${{ github.ref_name }}
        # Set the baseURL dynamically to match the expected GitHub Pages repository path
        run: hugo --minify --baseURL "https://${{ github.repository_owner }}.github.io/prism/"

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./web/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4